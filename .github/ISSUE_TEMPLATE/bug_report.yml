name: Bug report
description: Something is broken or behaves unexpectedly in the SDK.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please include enough
        detail for us to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimal steps or code snippet that reproduces the bug. If possible,
        link to a small repo or gist that demonstrates the issue.
      render: swift
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or unexpected output.
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SynheartWear version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: toolchain-version
    attributes:
      label: Swift / Xcode version
      placeholder: "Swift 5.9 / Xcode 15.4"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: iOS / watchOS version
      placeholder: "iOS 17.5 / watchOS 10.5"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - watchOS
        - macOS (Catalyst)
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help (logs, screenshots, related issues).
